name: miritalk_app
description: "miritalk project"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/evidence_1.png
    - assets/images/evidence_2.png
    - assets/images/evidence_3.png
    - assets/images/onboarding_1.png
    - assets/images/onboarding_2.png
    - assets/images/onboarding_3.png
    - assets/images/onboarding_4.png
    - assets/icons/
    - assets/splash/

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_sign_in: ^6.2.1
  http: ^1.2.1
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  photo_manager: ^3.9.0
  carousel_slider: ^5.0.0
  google_fonts: ^6.2.1
  kakao_flutter_sdk_user: ^1.9.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"   # iOS + fallback
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  android: true
  ios: true
  color: "#1A1A2E"
  image: "assets/splash/splash_logo6.png"
  android_12:
    image: "assets/splash/splash_logo6.png"
    color: "#1A1A2E"